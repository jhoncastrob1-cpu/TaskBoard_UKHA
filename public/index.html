  var ganttContainer = el('div', { id:'gantt-container', style:'flex:1;min-height:0;display:flex;flex-direction:column' }, [renderGantt()]);
  section.appendChild(ganttContainer);
  return section;
}

/* Vuelve a dibujar solo el contenido del Gantt (barras, regla, dependencias)
   sin pasar por render(), para que el slider de zoom y cualquier otro control
   fuera de #gantt-container no pierda foco ni referencia a mitad de un gesto
   de arrastre. */
function refreshGanttOnly(){
  var container = document.getElementById('gantt-container');
  if (!container) { render(); return; } // salvaguarda si el contenedor no existe todavía
  container.innerHTML = '';
  container.appendChild(renderGantt());
}

/* Arrastre del borde derecho del panel lateral de actividades del Gantt
   (la columna con los nombres/índices), para hacerlo más ancho o angosto.
   Mismo patrón que el resize de columnas del Kanban: se muta el ancho
   directamente durante el gesto y solo se persiste + refresca el Gantt al
   soltar, para no perder fluidez ni interrumpir el propio arrastre. */
function attachGanttSidebarResizeDrag(handle, sidebarEl){
  handle.addEventListener('mousedown', function(e){
    e.preventDefault();
    e.stopPropagation();
    handle.classList.add('active');
    var startX = e.clientX;
    var startWidth = STATE.ganttSidebarWidth || 230;
    function onMove(ev){
      var newWidth = Math.max(140, Math.min(480, startWidth + (ev.clientX - startX)));
      sidebarEl.style.width = newWidth + 'px';
      sidebarEl.style.minWidth = newWidth + 'px';
      handle.style.left = newWidth + 'px';
    }
    function onUp(){
      handle.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      STATE.ganttSidebarWidth = parseInt(sidebarEl.style.width, 10);
      saveData(STATE.data);
      // El ancho ya quedó aplicado visualmente por el mousemove; no hace
      // falta refreshGanttOnly aquí, pero si el usuario cambia de vista y
      // vuelve, renderGantt ya lee STATE.ganttSidebarWidth directamente.
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  return handle;
}

function renderGantt(){
  var cards = filteredCards();
  var columns = boardColumns(activeBoard().id);
  // Una actividad normal necesita ambas fechas; un hito solo necesita fecha fin.
  var withDates = cards.filter(function(c){ return c.type === 'milestone' ? !!c.dueDate : (c.startDate && c.dueDate); });
  // Orden manual: las filas se pueden arrastrar en el sidebar del Gantt para
  // reordenarlas (independiente del orden de las columnas del Kanban). Las
  // que no tienen ganttOrder asignado (actividades antiguas o recién creadas)
  // van al final, en el orden en que ya estaban.
  withDates = withDates.slice().sort(function(a, b){
    var oa = (a.ganttOrder != null) ? a.ganttOrder : 100000;
    var ob = (b.ganttOrder != null) ? b.ganttOrder : 100000;
    return oa - ob;
  });

  if (withDates.length === 0){
    return el('div', { class:'empty-state' }, [
      el('div', { class:'big' }, ['Sin fechas para mostrar']),
      el('div', { class:'small' }, ['Añade fechas a tus actividades o hitos para verlas en el cronograma.'])
    ]);
  }

  var allStarts = withDates.map(function(c){ return parseDate(c.startDate || c.dueDate); });
  var allEnds = withDates.map(function(c){ return parseDate(c.dueDate); });
  var today = parseDate(todayISO());
  // El rango del Gantt siempre incluye hoy, aunque ninguna actividad tenga
  // fechas cercanas a la fecha actual — así la línea de corte nunca desaparece.
  var minDate = addDays(new Date(Math.min.apply(null, allStarts.concat([today]))), -2);
  var maxDate = addDays(new Date(Math.max.apply(null, allEnds.concat([today]))), 5);
  var totalDays = Math.max(daysBetween(minDate, maxDate), 7);
  var dayWidth = Math.round(32 * STATE.ganttZoom);
  var rowHeight = 36;
  var todayOffset = daysBetween(minDate, today) * dayWidth;

  var days = [];
  for (var i = 0; i < totalDays; i++) days.push(addDays(minDate, i));

  function colOf(id){ return columns.find(function(c){ return c.id === id; }); }
  var rowIndexById = {};
  withDates.forEach(function(c, idx){ rowIndexById[c.id] = idx; });

  var wrap = el('div', { class:'gantt-wrap' });
  var inner = el('div', { class:'gantt-inner' });

  var sidebar = el('div', { class:'gantt-sidebar', style:'width:'+STATE.ganttSidebarWidth+'px;min-width:'+STATE.ganttSidebarWidth+'px' });
  sidebar.appendChild(el('div', { class:'gantt-sidebar-head' }, [
    el('span', { class:'gantt-row-index' }, ['#']),
    'Actividad'
  ]));
  withDates.forEach(function(card, idx){
    var row = el('div', {
      class:'gantt-row-label', draggable:'true',
      onclick:function(){ setState({ modalCard: card }); }
    });
    row.appendChild(el('span', { class:'gantt-row-index' }, [String(idx + 1)]));
    if (card.type === 'milestone') row.appendChild(el('span', { class:'milestone-diamond', style:'flex-shrink:0' }));
    row.appendChild(document.createTextNode(card.title));

    row.addEventListener('dragstart', function(e){
      STATE.ganttDragCardId = card.id;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', function(){
      STATE.ganttDragCardId = null;
      row.classList.remove('dragging');
    });
    row.addEventListener('dragover', function(e){
      e.preventDefault();
      row.classList.add('drag-over-row');
    });
    row.addEventListener('dragleave', function(){ row.classList.remove('drag-over-row'); });
    row.addEventListener('drop', function(e){
      e.preventDefault();
      row.classList.remove('drag-over-row');
      if (STATE.ganttDragCardId && STATE.ganttDragCardId !== card.id){
        reorderGanttRow(STATE.ganttDragCardId, idx, withDates);
      }
    });

    sidebar.appendChild(row);
  });
  inner.appendChild(sidebar);

  var sidebarResizeHandle = el('div', { class:'gantt-sidebar-resize-handle', style:'left:'+STATE.ganttSidebarWidth+'px' });
  attachGanttSidebarResizeDrag(sidebarResizeHandle, sidebar);
  inner.appendChild(sidebarResizeHandle);

  var scroll = el('div', { class:'gantt-scroll', style:'width:'+(totalDays*dayWidth)+'px' });

  var ruler = el('div', { class:'gantt-ruler' });

  // Fila superior: meses agrupados (uno por cada bloque contiguo de días del mismo mes)
  var monthsRow = el('div', { class:'gantt-ruler-months' });
  var i2 = 0;
  while (i2 < days.length){
    var m = days[i2].getMonth(), y = days[i2].getFullYear();
    var span = 0;
    while (i2 + span < days.length && days[i2+span].getMonth() === m && days[i2+span].getFullYear() === y) span++;
    var label = days[i2].toLocaleDateString('es-ES', { month:'long', year:'numeric' });
    monthsRow.appendChild(el('div', { class:'gantt-ruler-month', style:'width:'+(span*dayWidth)+'px' }, [label]));
    i2 += span;
  }
  ruler.appendChild(monthsRow);

  // Fila inferior: día + abreviatura de día de semana, con fin de semana resaltado
  var daysRow = el('div', { class:'gantt-ruler-days' });
  days.forEach(function(d){
    var isToday = daysBetween(d, today) === 0;
    var weekend = isWeekend(d);
    daysRow.appendChild(el('div', {
      class:'gantt-ruler-day' + (isToday?' today':'') + (weekend&&!isToday?' weekend':''),
      style:'width:'+dayWidth+'px;min-width:'+dayWidth+'px'
    }, [
      el('div', { class:'dow' }, [d.toLocaleDateString('es-ES', { weekday:'short' }).slice(0,2)]),
      el('div', {}, [String(d.getDate())])
    ]));
  });
  ruler.appendChild(daysRow);
  scroll.appendChild(ruler);

  var gbody = el('div', { class:'gantt-body', style:'height:'+(withDates.length*rowHeight)+'px' });

  // Franjas verticales grises tenues detrás de las barras para cada sábado/domingo
  days.forEach(function(d, idx){
    if (isWeekend(d)){
      gbody.appendChild(el('div', {
        class:'gantt-weekend-col',
        style:'left:'+(idx*dayWidth)+'px;width:'+dayWidth+'px;height:'+(withDates.length*rowHeight)+'px'
      }));
    }
  });

  // La línea de corte de "hoy" siempre se dibuja: el rango del Gantt fue
  // expandido arriba para incluir siempre la fecha actual.
  if (todayOffset >= 0 && todayOffset <= totalDays*dayWidth){
    gbody.appendChild(el('div', { class:'gantt-today-line', style:'left:'+(todayOffset+dayWidth/2)+'px;height:'+(withDates.length*rowHeight)+'px' }));
  }

  // Líneas de dependencia (SVG superpuesto, detrás de las barras pero delante de las franjas)
  var depSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  depSvg.setAttribute('class', 'gantt-dep-svg');
  depSvg.setAttribute('width', totalDays*dayWidth);
  depSvg.setAttribute('height', withDates.length*rowHeight);
  var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  var marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'dep-arrow');
  marker.setAttribute('viewBox', '0 0 8 8'); marker.setAttribute('refX', '7'); marker.setAttribute('refY', '4');
  marker.setAttribute('markerWidth', '7'); marker.setAttribute('markerHeight', '7'); marker.setAttribute('orient', 'auto-start-reverse');
  var arrowPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  arrowPath.setAttribute('d', 'M0,0 L8,4 L0,8 z'); arrowPath.setAttribute('fill', '#9BA6A3');
  marker.appendChild(arrowPath); defs.appendChild(marker); depSvg.appendChild(defs);

  function barGeometry(card){
    var isM = card.type === 'milestone';
    var start = parseDate(card.startDate || card.dueDate);
    var end = parseDate(card.dueDate);
    var offset = daysBetween(minDate, start) * dayWidth;
    var width = isM ? dayWidth : Math.max(daysBetween(start, end) * dayWidth + dayWidth, dayWidth);
    var rowIdx = rowIndexById[card.id];
    var cy = rowIdx * rowHeight + rowHeight/2;
    return { offset:offset, width:width, cy:cy, isM:isM };
  }

  withDates.forEach(function(card){
    (card.dependencies || []).forEach(function(depId){
      var depCard = withDates.find(function(c){ return c.id === depId; });
      if (!depCard) return;
      depSvg.appendChild(dependencyPath(barGeometry(depCard), barGeometry(card)));
    });
  });
  gbody.appendChild(depSvg);

  withDates.forEach(function(card){
    var col = colOf(card.columnId);
    var done = isDoneColumn(col);
    var priority = PRIORITIES.find(function(p){ return p.key === card.priority; });
    var geo = barGeometry(card);
    var track = el('div', { class:'gantt-track' });

    if (card.type === 'milestone'){
      var diamondColor = done ? 'var(--done)' : (priority ? priority.color : '#8A968F');
      var diamond = el('div', {
        class:'gantt-milestone', 'data-card-id': card.id,
        style:'left:'+(geo.offset+dayWidth/2)+'px;background:'+diamondColor,
        title: card.title,
        onclick:function(e){ e.stopPropagation(); setState({ modalCard: card }); }
      });
      var msPort = el('div', { class:'gantt-conn-port', title:'Arrastra para crear una dependencia' });
      attachDependencyDrag(msPort, card, gbody);
      diamond.appendChild(msPort);
      track.appendChild(diamond);
    } else {
      var barColor = done ? 'var(--done)' : (priority ? priority.color : (col ? col.accent : '#888'));
      var bar = el('div', {
        class:'gantt-bar', 'data-card-id': card.id,
        style:'left:'+geo.offset+'px;width:'+geo.width+'px;background:'+barColor,
        title: card.title + ' — arrastra los bordes para ajustar fechas',
        onclick:function(){ setState({ modalCard: card }); }
      });
      if (card.progress > 0){
        bar.appendChild(el('div', { style:'position:absolute;left:0;top:0;bottom:0;width:'+card.progress+'%;background:rgba(0,0,0,0.22);border-radius:7px 0 0 7px;pointer-events:none' }));
      }
      var barContent = el('div', { class:'gantt-bar-content' }, [
        el('span', { class:'gantt-bar-pct' }, [Math.round(card.progress) + '%'])
      ]);
      bar.appendChild(barContent);

      // Asas de arrastre en ambos extremos para editar fecha de inicio/fin
      var leftHandle = el('div', { class:'gantt-bar-handle left' });
      var rightHandle = el('div', { class:'gantt-bar-handle right' });
      attachGanttDrag(leftHandle, card, 'start', minDate, dayWidth);
      attachGanttDrag(rightHandle, card, 'end', minDate, dayWidth);
      attachGanttDrag(bar, card, 'move', minDate, dayWidth);
      bar.appendChild(leftHandle);
      bar.appendChild(rightHandle);

      // Puerto de conexión: arrastrar desde aquí sobre otra barra crea una dependencia
      var port = el('div', { class:'gantt-conn-port', title:'Arrastra para crear una dependencia' });
      attachDependencyDrag(port, card, gbody);
      bar.appendChild(port);

      track.appendChild(bar);
    }
    gbody.appendChild(track);
  });
  scroll.appendChild(gbody);
  inner.appendChild(scroll);
  wrap.appendChild(inner);
  return wrap;
}

/* Arrastrar desde el puerto de conexión de una barra/rombo dibuja una línea
   temporal que sigue el cursor; al soltar sobre otra barra/rombo (detectado
   con elementFromPoint) se crea la dependencia origen->destino, siempre que
   no cree un ciclo. Un pequeño SVG "en vivo" se añade y quita del gbody solo
   durante el arrastre, sin pasar por render() para que sea fluido. */
function attachDependencyDrag(port, fromCard, gbody){
  port.addEventListener('mousedown', function(e){
    e.preventDefault();
    e.stopPropagation();
    var gbodyRect = gbody.getBoundingClientRect();
    var portRect = port.getBoundingClientRect();
    var startX = portRect.left + portRect.width/2 - gbodyRect.left;
    var startY = portRect.top + portRect.height/2 - gbodyRect.top;

    var liveSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    liveSvg.setAttribute('class', 'gantt-dep-live-svg');
    liveSvg.setAttribute('width', gbody.scrollWidth || gbody.offsetWidth);
    liveSvg.setAttribute('height', gbody.scrollHeight || gbody.offsetHeight);
    var livePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    livePath.setAttribute('fill', 'none');
    livePath.setAttribute('stroke', 'var(--accent-dark)');
    livePath.setAttribute('stroke-width', '2');
    livePath.setAttribute('stroke-dasharray', '5 4');
    liveSvg.appendChild(livePath);
    gbody.appendChild(liveSvg);

    var lastTarget = null;
    function updatePath(mx, my){
      var arm = Math.max(Math.abs(mx - startX) / 2, 26);
      var d = 'M '+startX+' '+startY+' C '+(startX+arm)+' '+startY+', '+(mx-arm)+' '+my+', '+mx+' '+my;
      livePath.setAttribute('d', d);
    }
    updatePath(startX, startY);

    function onMove(ev){
      var mx = ev.clientX - gbodyRect.left;
      var my = ev.clientY - gbodyRect.top;
      updatePath(mx, my);
      var el2 = document.elementFromPoint(ev.clientX, ev.clientY);
      var barEl = el2 && el2.closest ? el2.closest('.gantt-bar,.gantt-milestone') : null;
      if (lastTarget && lastTarget !== barEl) lastTarget.classList.remove('gantt-conn-target');
      if (barEl && barEl.getAttribute('data-card-id') !== fromCard.id){
        barEl.classList.add('gantt-conn-target');
        lastTarget = barEl;
      } else {
        lastTarget = null;
      }
    }
    function onUp(ev){
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      liveSvg.remove();
      if (lastTarget){
        lastTarget.classList.remove('gantt-conn-target');
        var targetId = lastTarget.getAttribute('data-card-id');
        createDependency(targetId, fromCard.id);
      }
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

/* Crea la dependencia targetCardId -> dependsOnCardId (targetCard pasa a
   depender de dependsOnCard), validando que no exista ya y que no forme
   un ciclo con las dependencias actuales del tablero. */
function createDependency(targetCardId, dependsOnCardId){
  if (!targetCardId || !dependsOnCardId || targetCardId === dependsOnCardId) return;
  var d = STATE.data;
  var target = d.cards.find(function(c){ return c.id === targetCardId; });
  if (!target) return;
  if (!Array.isArray(target.dependencies)) target.dependencies = [];
  if (target.dependencies.indexOf(dependsOnCardId) >= 0) return; // ya existe

  // ¿dependsOnCardId ya depende (directa o transitivamente) de targetCardId?
  // Si es así, añadir esta dependencia crearía un ciclo — se rechaza.
  var seen = {};
  function dependsOn(cid, goal){
    if (cid === goal) return true;
    if (seen[cid]) return false;
    seen[cid] = true;
    var c = d.cards.find(function(x){ return x.id === cid; });
    if (!c || !c.dependencies) return false;
    return c.dependencies.some(function(dep){ return dependsOn(dep, goal); });
  }
  if (dependsOn(dependsOnCardId, targetCardId)){
    alert('No se puede crear esta relación: formaría un ciclo entre actividades.');
    return;
  }

  target.dependencies.push(dependsOnCardId);
  setState({ data: d });
}

/* Arrastre de la barra Gantt: 'start' mueve la fecha de inicio, 'end' la fecha
   fin, 'move' desplaza ambas manteniendo la duración. Todo en unidades de día
   completo (snap a dayWidth) para que las fechas resultantes sean limpias. */
function attachGanttDrag(handle, card, mode, minDate, dayWidth){
  handle.addEventListener('mousedown', function(e){
    e.preventDefault();
    e.stopPropagation();
    var startX = e.clientX;
    var origStart = parseDate(card.startDate || card.dueDate);
    var origEnd = parseDate(card.dueDate);
    var moved = false;
    function onMove(ev){
      var deltaPx = ev.clientX - startX;
      var deltaDays = Math.round(deltaPx / dayWidth);
      if (deltaDays === 0) return;
      moved = true;
      var newStart = origStart, newEnd = origEnd;
      if (mode === 'start' || mode === 'move') newStart = addDays(origStart, deltaDays);
      if (mode === 'end' || mode === 'move') newEnd = addDays(origEnd, deltaDays);
      if (newStart > newEnd) { if (mode === 'start') newStart = newEnd; else newEnd = newStart; }
      var d = STATE.data;
      var liveCard = d.cards.find(function(c){ return c.id === card.id; });
      if (liveCard){
        if (mode !== 'end') liveCard.startDate = newStart.toISOString().slice(0,10);
        if (mode !== 'start') liveCard.dueDate = newEnd.toISOString().slice(0,10);
        render();
      }
    }
    function onUp(){
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (moved) saveData(STATE.data);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

/* ===================== Sidebar de indicadores ===================== */
function computeStats(){
  var cards = boardCards(activeBoard().id);
  var columns = boardColumns(activeBoard().id);
  var colById = {};
  columns.forEach(function(c){ colById[c.id] = c; });

  var done = 0, inProgress = 0, pending = 0, overdue = 0, dueSoon = 0, progressSum = 0;
  var firstColId = columns.length ? columns[0].id : null;

  cards.forEach(function(card){
    var col = colById[card.columnId];
    var isDone = isDoneColumn(col);
    if (isDone) {
      done++;
    } else if (card.columnId === firstColId) {
      pending++;
    } else {
      inProgress++;
    }
    var status = dueStatus(card.dueDate, isDone);
    if (status === 'overdue') overdue++;
    else if (status === 'due-soon') dueSoon++;
    progressSum += isDone ? 100 : (Number(card.progress) || 0);
  });

  var total = cards.length;
  var avgProgress = total ? Math.round(progressSum / total) : 0;
  return { total:total, done:done, inProgress:inProgress, pending:pending, overdue:overdue, dueSoon:dueSoon, avgProgress:avgProgress };
}

function renderDonut(pct, size){
  size = size || 128;
  var stroke = 13;
  var r = (size - stroke) / 2;
  var c = size / 2;
  var circumference = 2 * Math.PI * r;
  var offset = circumference * (1 - pct / 100);
  var ns = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);

  var track = document.createElementNS(ns, 'circle');
  track.setAttribute('cx', c); track.setAttribute('cy', c); track.setAttribute('r', r);
  track.setAttribute('fill', 'none');
  track.setAttribute('stroke', '#EEF3F1');
  track.setAttribute('stroke-width', stroke);
  svg.appendChild(track);

  var arc = document.createElementNS(ns, 'circle');
  arc.setAttribute('cx', c); arc.setAttribute('cy', c); arc.setAttribute('r', r);
  arc.setAttribute('fill', 'none');
  arc.setAttribute('stroke', 'var(--accent)');
  arc.setAttribute('stroke-width', stroke);
  arc.setAttribute('stroke-linecap', 'round');
  arc.setAttribute('stroke-dasharray', circumference);
  arc.setAttribute('stroke-dashoffset', offset);
  arc.setAttribute('transform', 'rotate(-90 ' + c + ' ' + c + ')');
  arc.style.transition = 'stroke-dashoffset .3s ease';
  svg.appendChild(arc);

  var label = document.createElementNS(ns, 'text');
  label.setAttribute('x', c); label.setAttribute('y', c + 1);
  label.setAttribute('text-anchor', 'middle');
  label.setAttribute('dominant-baseline', 'middle');
  label.setAttribute('class', 'donut-center-label');
  label.textContent = pct + '%';
  svg.appendChild(label);

  var sub = document.createElementNS(ns, 'text');
  sub.setAttribute('x', c); sub.setAttribute('y', c + 18);
  sub.setAttribute('text-anchor', 'middle');
  sub.setAttribute('class', 'donut-center-sub');
  sub.textContent = 'PROMEDIO';
  svg.appendChild(sub);

  return el('div', { class:'donut-wrap' }, [svg]);
}

function renderStatsSidebar(){
  var stats = computeStats();
  var sidebar = el('div', { class:'sidebar-stats' });

  if (stats.total === 0){
    sidebar.appendChild(el('div', { class:'stats-block' }, [
      el('div', { class:'stats-title' }, ['Resumen']),
      el('div', { class:'empty-sidebar' }, ['Aún no hay actividades en este tablero. Los indicadores aparecerán aquí en cuanto añadas la primera tarjeta.'])
    ]));
    return sidebar;
  }

  // Bloque: avance promedio (donut)
  var donutBlock = el('div', { class:'stats-block' });
  donutBlock.appendChild(el('div', { class:'stats-title' }, ['Avance promedio']));
  donutBlock.appendChild(renderDonut(stats.avgProgress));
  sidebar.appendChild(donutBlock);

  // Bloque: progreso general (conteo por estado)
  var progressBlock = el('div', { class:'stats-block' });
  progressBlock.appendChild(el('div', { class:'stats-title' }, ['Distribución']));

  var track = el('div', { class:'progress-bar-track' });
  var segs = [
    { count: stats.done, color: 'var(--done)' },
    { count: stats.inProgress, color: 'var(--info)' },
    { count: stats.pending, color: 'var(--pending)' }
  ];
  segs.forEach(function(s){
    if (s.count > 0) {
      var w = (s.count / stats.total) * 100;
      track.appendChild(el('div', { class:'progress-seg', style:'width:'+w+'%;background:'+s.color }));
    }
  });
  progressBlock.appendChild(track);

  var legend = el('div', { class:'progress-legend' });
  legend.appendChild(el('div', { class:'item' }, [
    el('span', { class:'sw', style:'background:var(--done)' }), 'Terminadas',
    el('span', { class:'num' }, [String(stats.done)])
  ]));
  legend.appendChild(el('div', { class:'item' }, [
    el('span', { class:'sw', style:'background:var(--info)' }), 'En curso',
    el('span', { class:'num' }, [String(stats.inProgress)])
  ]));
  legend.appendChild(el('div', { class:'item' }, [
    el('span', { class:'sw', style:'background:var(--pending)' }), 'Pendientes',
    el('span', { class:'num' }, [String(stats.pending)])
  ]));
  progressBlock.appendChild(legend);
  sidebar.appendChild(progressBlock);

  // Bloque: indicadores clave
  var statsBlock = el('div', { class:'stats-block' });
  statsBlock.appendChild(el('div', { class:'stats-title' }, ['Indicadores']));

  function statRow(label, value, colorClass, dotColor){
    var labelEl = el('span', { class:'stat-label' }, [dotColor ? el('span', { class:'sw', style:'background:'+dotColor }) : null, label]);
    return el('div', { class:'stat-row' }, [ labelEl, el('span', { class:'stat-value' + (colorClass?' '+colorClass:'') }, [String(value)]) ]);
  }

  statsBlock.appendChild(statRow('Total de actividades', stats.total, null, null));
  statsBlock.appendChild(statRow('Pendientes', stats.pending, null, 'var(--pending)'));
  statsBlock.appendChild(statRow('En curso', stats.inProgress, null, 'var(--info)'));
  statsBlock.appendChild(statRow('Terminadas', stats.done, 'done', 'var(--done)'));
  statsBlock.appendChild(statRow('Por vencer (≤2 días)', stats.dueSoon, stats.dueSoon>0?'warn':null, 'var(--accent)'));
  statsBlock.appendChild(statRow('Vencidas', stats.overdue, stats.overdue>0?'danger':null, 'var(--danger)'));

  sidebar.appendChild(statsBlock);
  return sidebar;
}

/* ===================== Modal de tarjeta ===================== */
function renderCardModal(initial){
  var isNew = !initial.id;
  var columns = boardColumns(activeBoard().id);
  var form = {
    type: initial.type || 'task',
    title: initial.title || '',
    description: initial.description || '',
    columnId: initial.columnId,
    startDate: initial.startDate || todayISO(),
    dueDate: initial.dueDate || '',
    priority: initial.priority || 'med',
    progress: initial.progress || 0,
    dependencies: (initial.dependencies || []).slice(),
    assigneeId: initial.assigneeId || null
  };

  var overlay = el('div', { class:'modal-overlay' });
  overlay.addEventListener('mousedown', function(e){ if (e.target === overlay) setState({ modalCard:null }); });

  var modal = el('div', { class:'modal' });
  var head = el('div', { class:'modal-head' }, [
    el('h3', {}, [isNew ? 'Nueva actividad' : 'Editar actividad']),
    el('button', { class:'btn btn-ghost btn-icon', onclick:function(){ setState({ modalCard:null }); } }, ['✕'])
  ]);
  modal.appendChild(head);

  var body = el('div', { class:'modal-body' });

  // Tipo: Actividad vs Hito (referencia Primavera P6)
  var typePicker = el('div', { class:'priority-picker' });
  var startField; // referencia para poder ocultar/mostrar según el tipo
  function refreshTypePicker(){
    typePicker.innerHTML = '';
    ACTIVITY_TYPES.forEach(function(t){
      typePicker.appendChild(el('div', {
        class:'priority-opt' + (form.type===t.key?' selected':''),
        style:'color:var(--text)',
        onclick:function(){
          form.type = t.key;
          if (t.key === 'milestone') form.startDate = form.dueDate || form.startDate;
          refreshTypePicker();
          if (startField) startField.style.display = (form.type === 'milestone') ? 'none' : '';
        }
      }, [t.label]));
    });
  }
  refreshTypePicker();
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Tipo']), typePicker ]));

  var titleInput = el('input', { type:'text', value: form.title, placeholder:'¿Qué hay que hacer?' });
  titleInput.addEventListener('input', function(e){ form.title = e.target.value; });
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Título']), titleInput ]));

  var descInput = el('textarea', { placeholder:'Detalles, notas, contexto...' }, [form.description]);
  descInput.value = form.description;
  descInput.addEventListener('input', function(e){ form.description = e.target.value; });
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Descripción']), descInput ]));

  var select = el('select', {});
  columns.forEach(function(c){
    var opt = el('option', { value:c.id }, [c.name]);
    if (c.id === form.columnId) opt.selected = true;
    select.appendChild(opt);
  });
  select.addEventListener('change', function(e){ form.columnId = e.target.value; });
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Columna']), select ]));

  var startInput = el('input', { type:'date', value: form.startDate });
  startInput.addEventListener('input', function(e){ form.startDate = e.target.value; });
  var dueInput = el('input', { type:'date', value: form.dueDate });
  dueInput.addEventListener('input', function(e){ form.dueDate = e.target.value; });
  startField = el('div', { class:'field' }, [ el('label', {}, ['Fecha inicio']), startInput ]);
  if (form.type === 'milestone') startField.style.display = 'none';
  body.appendChild(el('div', { class:'field-row' }, [
    startField,
    el('div', { class:'field' }, [ el('label', {}, [form.type==='milestone' ? 'Fecha del hito' : 'Fecha límite']), dueInput ])
  ]));

  var priorityPicker = el('div', { class:'priority-picker' });
  function refreshPriorityPicker(){
    priorityPicker.innerHTML = '';
    PRIORITIES.forEach(function(p){
      priorityPicker.appendChild(el('div', {
        class:'priority-opt' + (form.priority===p.key?' selected':''),
        style:'color:'+p.color,
        onclick:function(){ form.priority = p.key; refreshPriorityPicker(); }
      }, [p.label]));
    });
  }
  refreshPriorityPicker();
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Prioridad']), priorityPicker ]));

  // Responsable: selector desplegable poblado desde el roster global de personas.
  // Importante: añadir una persona desde aquí NO debe disparar un render()
  // completo de la app (eso reconstruiría este mismo modal desde "initial" y
  // se perderían título/descripción/etc. que el usuario ya haya escrito sin
  // guardar) — por eso usa addPersonQuiet() y actualiza el <select> a mano.
  var people = (STATE.data.people || []).slice();
  var assigneeRow = el('div', { style:'display:flex; gap:8px; align-items:center' });
  var assigneeSelect = el('select', { style:'flex:1' });
  function rebuildAssigneeOptions(){
    assigneeSelect.innerHTML = '';
    assigneeSelect.appendChild(el('option', { value:'' }, ['Sin asignar']));
    people.forEach(function(p){
      var opt = el('option', { value:p.id }, [p.name + (p.role ? ' — ' + p.role : '')]);
      if (p.id === form.assigneeId) opt.selected = true;
      assigneeSelect.appendChild(opt);
    });
  }
  rebuildAssigneeOptions();
  assigneeSelect.addEventListener('change', function(e){ form.assigneeId = e.target.value || null; refreshNotifyBtn(); });
  assigneeRow.appendChild(el('div', { style:'flex:1' }, [assigneeSelect]));

  var notifyBtn = el('button', { class:'btn btn-sm', type:'button' }, [svgIcon('mail'), ' Notificar']);
  function refreshNotifyBtn(){
    var person = people.find(function(p){ return p.id === form.assigneeId; });
    var canNotify = person && person.email;
    notifyBtn.disabled = !canNotify;
    notifyBtn.style.opacity = canNotify ? '1' : '0.45';
    notifyBtn.style.cursor = canNotify ? 'pointer' : 'not-allowed';
    notifyBtn.title = canNotify ? ('Abrir un correo para avisar a ' + person.name) : 'Selecciona un responsable con correo registrado';
  }
  notifyBtn.addEventListener('click', function(){
    var person = people.find(function(p){ return p.id === form.assigneeId; });
    if (!person || !person.email) return;
    notifyAssigneeByEmail(person, {
      title: form.title || '(sin título todavía)',
      dueDate: form.dueDate,
      priority: form.priority,
      progress: form.progress,
      type: form.type
    });
  });
  refreshNotifyBtn();
  assigneeRow.appendChild(notifyBtn);

  // Mini-formulario local para añadir una persona sin cerrar ni reconstruir
  // el modal de tarjeta.
  var addPersonToggle = el('button', {
    class:'btn btn-ghost btn-sm', type:'button', style:'align-self:flex-start;margin-top:6px;padding-left:0'
  }, [svgIcon('plus'), ' Añadir una persona al equipo']);
  var addPersonForm = el('div', { class:'hidden', style:'display:none;gap:8px;margin-top:8px' });
  var apName = el('input', { type:'text', placeholder:'Nombre' });
  var apRole = el('input', { type:'text', placeholder:'Rol' });
  var apEmail = el('input', { type:'text', placeholder:'Correo' });
  var apSubmit = el('button', { class:'btn btn-accent btn-sm', type:'button' }, ['Añadir']);
  function submitInlinePerson(){
    if (!apName.value.trim()){ alert('Escribe al menos el nombre.'); return; }
    var newId = addPersonQuiet(apName.value, apRole.value, apEmail.value);
    var newPerson = STATE.data.people.find(function(p){ return p.id === newId; });
    people.push(newPerson);
    form.assigneeId = newId;
    rebuildAssigneeOptions();
    refreshNotifyBtn();
    apName.value = ''; apRole.value = ''; apEmail.value = '';
    addPersonForm.style.display = 'none';
  }
  apSubmit.addEventListener('click', submitInlinePerson);
  [apName, apRole, apEmail].forEach(function(inp){
    inp.addEventListener('keydown', function(e){ if (e.key === 'Enter'){ e.preventDefault(); submitInlinePerson(); } });
  });
  addPersonForm.appendChild(el('div', { style:'display:flex;gap:8px;flex:1' }, [apName, apRole, apEmail]));
  addPersonForm.appendChild(apSubmit);
  addPersonToggle.addEventListener('click', function(){
    var show = addPersonForm.style.display === 'none';
    addPersonForm.style.display = show ? 'flex' : 'none';
    if (show) apName.focus();
  });

  body.appendChild(el('div', { class:'field' }, [
    el('label', {}, ['Responsable']),
    assigneeRow,
    addPersonToggle,
    addPersonForm
  ]));

  var progressLabel = el('label', {}, ['Progreso: ' + form.progress + '%']);
  var progressInput = el('input', { type:'range', min:'0', max:'100', step:'5', value:form.progress });
  progressInput.addEventListener('input', function(e){ form.progress = Number(e.target.value); progressLabel.textContent = 'Progreso: ' + form.progress + '%'; });
  body.appendChild(el('div', { class:'field' }, [ progressLabel, progressInput ]));

  // Dependencias: cualquier otra tarjeta del mismo tablero, excluyendo a sí misma
  // y a cualquier tarjeta que ya dependa (directa o indirectamente) de esta, para
  // no permitir crear un ciclo A->B->A desde este selector.
  var candidateCards = boardCards(activeBoard().id).filter(function(c){ return c.id !== initial.id; });
  function wouldCreateCycle(candidateId){
    // ¿candidateId depende (directa o transitivamente) de la tarjeta que estamos editando?
    if (!initial.id) return false;
    var seen = {};
    function dependsOnInitial(cid){
      if (cid === initial.id) return true;
      if (seen[cid]) return false;
      seen[cid] = true;
      var c = STATE.data.cards.find(function(x){ return x.id === cid; });
      if (!c || !c.dependencies) return false;
      return c.dependencies.some(dependsOnInitial);
    }
    return dependsOnInitial(candidateId);
  }
  var depBox = el('div', { style:'max-height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;border:1px solid var(--border);border-radius:8px;padding:8px;background:var(--panel-2)' });
  if (candidateCards.length === 0){
    depBox.appendChild(el('div', { style:'font-size:12px;color:var(--text-faint)' }, ['No hay otras actividades en este tablero todavía.']));
  } else {
    candidateCards.forEach(function(c){
      var blocked = wouldCreateCycle(c.id);
      var row = el('label', { style:'display:flex;align-items:center;gap:8px;font-size:12.5px;color:'+(blocked?'var(--text-faint)':'var(--text)')+';cursor:'+(blocked?'not-allowed':'pointer') });
      var cb = el('input', { type:'checkbox' });
      cb.checked = form.dependencies.indexOf(c.id) >= 0;
      cb.disabled = blocked;
      cb.addEventListener('change', function(){
        var idx = form.dependencies.indexOf(c.id);
        if (cb.checked && idx < 0) form.dependencies.push(c.id);
        else if (!cb.checked && idx >= 0) form.dependencies.splice(idx, 1);
      });
      row.appendChild(cb);
      row.appendChild(document.createTextNode(c.title + (blocked ? ' (crearía un ciclo)' : '')));
      depBox.appendChild(row);
    });
  }
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Depende de']), depBox ]));

  modal.appendChild(body);

  var foot = el('div', { class:'modal-foot' });
  var leftFoot = el('div', {});
  if (!isNew){
    leftFoot.appendChild(el('button', {
      class:'btn btn-ghost', style:'color:var(--danger)',
      onclick:function(){ deleteCard(initial.id); }
    }, ['Eliminar']));
  }
  foot.appendChild(leftFoot);
  var rightFoot = el('div', { class:'row' });
  rightFoot.appendChild(el('button', { class:'btn btn-ghost', onclick:function(){ setState({ modalCard:null }); } }, ['Cancelar']));
  rightFoot.appendChild(el('button', {
    class:'btn btn-accent',
    onclick:function(){
      if (!form.title.trim()){ alert('El título no puede estar vacío.'); return; }
      if (!form.dueDate){ alert(form.type==='milestone' ? 'El hito necesita una fecha.' : 'La actividad necesita una fecha límite.'); return; }
      var boardId = columns.find(function(c){ return c.id === form.columnId; }).boardId;
      upsertCard({
        id: initial.id || uid(),
        boardId: boardId,
        columnId: form.columnId,
        order: initial.order != null ? initial.order : 0,
        ganttOrder: initial.ganttOrder,
        type: form.type,
        title: form.title.trim(),
        description: form.description,
        startDate: form.type === 'milestone' ? form.dueDate : form.startDate,
        dueDate: form.dueDate,
        priority: form.priority,
        progress: form.type === 'milestone' ? (form.progress >= 100 ? 100 : 0) : Number(form.progress),
        dependencies: form.dependencies,
        assigneeId: form.assigneeId
      });
    }
  }, ['Guardar']));
  foot.appendChild(rightFoot);
  modal.appendChild(foot);

  overlay.appendChild(modal);
  return overlay;
}

    el('h3', {}, [isRecolor ? 'Cambiar color de columna' : 'Color de la nueva columna']),

  ]));

  var body = el('div', { class:'modal-body' });

  ]));

  var foot = el('div', { class:'modal-foot', style:'justify-content:flex-end' });
  foot.appendChild(el('button', { class:'btn btn-ghost', onclick:close }, ['Cancelar']));
  modal.appendChild(foot);

  overlay.appendChild(modal);
  return overlay;
}

/* ===================== Modal de gestión de equipo/personas ===================== */
function renderPeopleModal(){
  var people = (STATE.data.people || []).slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
  var overlay = el('div', { class:'modal-overlay' });
  function close(){ setState({ peopleModal:false }); }
  overlay.addEventListener('mousedown', function(e){ if (e.target === overlay) close(); });

  var modal = el('div', { class:'modal', style:'max-width:520px' });
  modal.appendChild(el('div', { class:'modal-head' }, [
    el('h3', {}, ['Equipo']),
    el('button', { class:'btn btn-ghost btn-icon', onclick:close }, ['✕'])
  ]));

  var body = el('div', { class:'modal-body' });
  body.appendChild(el('p', { style:'margin:0;font-size:12.5px;color:var(--text-dim);line-height:1.5' }, [
    'Estas personas están disponibles como responsables en cualquier actividad de cualquier tablero. Puedes añadir las que necesites.'
  ]));

  // Lista de personas existentes
  var list = el('div', { style:'display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto' });
  if (people.length === 0){
    list.appendChild(el('div', { style:'font-size:12px;color:var(--text-faint);padding:8px 0' }, ['Todavía no has añadido a nadie.']));
  }
  people.forEach(function(p){
    var row = el('div', { style:'display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel-2);border:1px solid var(--border-soft);border-radius:8px' });
    row.appendChild(el('div', { style:'width:28px;height:28px;border-radius:50%;background:var(--accent-soft);color:var(--accent-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0' }, [
      (p.name.trim()[0] || '?').toUpperCase()
    ]));
    var infoCol = el('div', { style:'flex:1;min-width:0' }, [
      el('div', { style:'font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis' }, [p.name]),
      el('div', { style:'font-size:11.5px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis' }, [
        [p.role, p.email].filter(Boolean).join(' · ') || 'Sin rol ni correo'
      ])
    ]);
    row.appendChild(infoCol);
    row.appendChild(el('button', {
      class:'btn btn-ghost btn-icon', title:'Eliminar de la lista',
      onclick:function(){
        if (confirm('¿Quitar a "' + p.name + '" del equipo? Las actividades que tenía asignadas quedarán sin responsable.')){
          deletePerson(p.id);
        }
      }
    }, ['✕']));
    list.appendChild(row);
  });
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Personas actuales']), list ]));

  // Formulario para añadir una nueva persona
  var newName = el('input', { type:'text', placeholder:'Nombre completo' });
  var newRole = el('input', { type:'text', placeholder:'Rol (ej. Diseñadora, PM...)' });
  var newEmail = el('input', { type:'text', placeholder:'correo@ejemplo.com' });
  function submitNewPerson(){
    if (!newName.value.trim()){ alert('Escribe al menos el nombre.'); return; }
    addPerson(newName.value, newRole.value, newEmail.value);
    setState({ peopleModal:true }); // vuelve a abrir el modal ya refrescado con la nueva persona
  }
  [newName, newRole, newEmail].forEach(function(inp){
    inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') submitNewPerson(); });
  });

  var addRow = el('div', { style:'display:flex;gap:8px;margin-top:4px' }, [
    el('div', { style:'flex:1' }, [newName]),
    el('div', { style:'flex:1' }, [newRole]),
    el('div', { style:'flex:1' }, [newEmail])
  ]);
  body.appendChild(el('div', { class:'field' }, [
    el('label', {}, ['Añadir persona']),
    addRow,
    el('button', { class:'btn btn-accent btn-sm', style:'margin-top:8px;align-self:flex-start', onclick:submitNewPerson }, [svgIcon('plus'), ' Añadir al equipo'])
  ]));

  modal.appendChild(body);

  var foot = el('div', { class:'modal-foot', style:'justify-content:flex-end' });
  foot.appendChild(el('button', { class:'btn btn-ghost', onclick:close }, ['Cerrar']));
  modal.appendChild(foot);

  overlay.appendChild(modal);
  return overlay;
}

function renderEmailModal(){
  var stats = computeStats();
  var recipientsValue = loadSavedRecipients();
  var overlay = el('div', { class:'modal-overlay' });
  function close(){ setState({ emailModal:false }); }
  overlay.addEventListener('mousedown', function(e){ if (e.target === overlay) close(); });

  var modal = el('div', { class:'modal', style:'max-width:480px' });
  modal.appendChild(el('div', { class:'modal-head' }, [
    el('h3', {}, ['Enviar resumen por correo']),
    el('button', { class:'btn btn-ghost btn-icon', onclick:close }, ['✕'])
  ]));

  var body = el('div', { class:'modal-body' });
  body.appendChild(el('p', { style:'margin:0;font-size:12.5px;color:var(--text-dim);line-height:1.5' }, [
    'Esto abrirá tu programa de correo (Outlook, Gmail, etc.) con el resumen ya redactado — tú confirmas el envío desde ahí. Aún no se automatiza el envío periódico; primero prueba cómo se ve.'
  ]));

  var input = el('input', { type:'text', placeholder:'correo1@ejemplo.com, correo2@ejemplo.com', value:recipientsValue });
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Destinatarios (separados por coma)']), input ]));

  var previewBox = el('div', {
    style:'max-height:150px;overflow-y:auto;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--text-dim);white-space:pre-wrap;font-family:inherit;line-height:1.5'
  }, [
    'Total: ' + stats.total + ' · Pendientes: ' + stats.pending + ' · En curso: ' + stats.inProgress +
    ' · Terminadas: ' + stats.done + ' · Vencidas: ' + stats.overdue + ' · Avance promedio: ' + stats.avgProgress + '%\n\n' +
    'El correo incluye además el detalle individual de cada actividad (columna, estado y % de avance).'
  ]);
  body.appendChild(el('div', { class:'field' }, [ el('label', {}, ['Vista previa del resumen general']), previewBox ]));

  modal.appendChild(body);

  var foot = el('div', { class:'modal-foot', style:'justify-content:flex-end' });
  var row = el('div', { class:'row' });
  row.appendChild(el('button', { class:'btn btn-ghost', onclick:close }, ['Cancelar']));
  row.appendChild(el('button', {
    class:'btn btn-accent',
    onclick:function(){
      var raw = input.value.trim();
      if (!raw){ alert('Escribe al menos un correo destinatario.'); return; }
      var recipients = raw.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
      saveRecipients(raw);
      sendStatusEmail(recipients);
      close();
    }
  }, [svgIcon('mail'), ' Abrir en mi correo']));
  foot.appendChild(row);
  modal.appendChild(foot);

  overlay.appendChild(modal);
  return overlay;
}

function renderImportModal(){
  var overlay = el('div', { class:'modal-overlay' });
  overlay.addEventListener('mousedown', function(e){ if (e.target === overlay) setState({ importModal:false, importError:null }); });
  var modal = el('div', { class:'modal', style:'max-width:460px' });
  modal.appendChild(el('div', { class:'modal-head' }, [
    el('h3', {}, ['Importar datos']),
    el('button', { class:'btn btn-ghost btn-icon', onclick:function(){ setState({ importModal:false, importError:null }); } }, ['✕'])
  ]));

  var body = el('div', { class:'modal-body' });
  body.appendChild(el('p', { style:'margin:0;font-size:12.5px;color:var(--text-dim);line-height:1.5' }, [
    'Selecciona un archivo .json exportado previamente desde TaskBoard. Esto reemplazará todos los tableros, columnas y tarjetas actuales.'
  ]));

  var fileInput = el('input', { type:'file', accept:'.json,application/json', class:'hidden' });
  var drop = el('div', { class:'import-drop' }, [
    el('strong', {}, ['Haz clic para elegir un archivo']), ' o arrástralo aquí'
  ]);
  drop.addEventListener('click', function(){ fileInput.click(); });
  drop.addEventListener('dragover', function(e){ e.preventDefault(); drop.classList.add('drag-over'); });
  drop.addEventListener('dragleave', function(){ drop.classList.remove('drag-over'); });
  drop.addEventListener('drop', function(e){
    e.preventDefault(); drop.classList.remove('drag-over');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handleImportFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function(e){
    if (e.target.files && e.target.files[0]) handleImportFile(e.target.files[0]);
  });

  body.appendChild(drop);
  body.appendChild(fileInput);

  if (STATE.importError){
    body.appendChild(el('p', { style:'margin:0;font-size:12px;color:var(--danger)' }, [STATE.importError]));
  }

  modal.appendChild(body);

  var foot = el('div', { class:'modal-foot', style:'justify-content:flex-end' });
  foot.appendChild(el('button', { class:'btn btn-ghost', onclick:function(){ setState({ importModal:false, importError:null }); } }, ['Cancelar']));
  modal.appendChild(foot);

  overlay.appendChild(modal);
  return overlay;
}

function handleImportFile(file){
  importDataFromFile(file, function(ok, error, incoming){
    if (!ok){
      setState({ importError: error });
      return;
    }
    if (!confirm('Esto reemplazará todos tus datos actuales por los del archivo importado. ¿Continuar?')){
      return;
    }
    if (!incoming.activeBoard && incoming.boards.length) incoming.activeBoard = incoming.boards[0].id;
    STATE.data = incoming;
    setState({ data: incoming, importModal:false, importError:null, modalCard:null });
  });
}

/* ===================== Inicio =====================
   render() inicial muestra la pantalla de carga (STATE.loading = true por
   defecto); initApp() trae los datos compartidos y dispara el render real
   cuando terminan de llegar. */
try {
  render();
  initApp();
} catch (e) {
  var elx = document.getElementById('boot-error');
  var detail = document.getElementById('boot-error-detail');
  detail.textContent = (e && e.stack) || String(e);
  elx.classList.add('show');
}
